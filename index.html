<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sunidhi 💜</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    overflow: hidden;
    background: black;
}

/* Story */
.story {
    position: absolute;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
    padding: 20px;
    opacity: 0;
    transition: opacity 0.8s ease;
}

.active {
    opacity: 1;
    z-index: 1;
}

/* Gradients */
.s1 { background: linear-gradient(135deg,#c084fc,#f9a8d4,#93c5fd); }
.s2 { background: linear-gradient(135deg,#a78bfa,#f472b6,#60a5fa); }
.s3 { background: linear-gradient(135deg,#8b5cf6,#ec4899,#3b82f6); }
.s4 { background: linear-gradient(135deg,#9333ea,#db2777,#2563eb); }

img {
    width: 260px;
    border-radius: 20px;
    margin: 20px;
}

/* Progress bars */
.progress {
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    display: flex;
    gap: 5px;
}

.bar {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.3);
    overflow: hidden;
}

.fill {
    height: 100%;
    width: 0%;
    background: white;
}

/* Tap zones */
.zone {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
}

.left { left: 0; }
.right { right: 0; }

/* Popup */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background: white;
    color: black;
    padding: 20px;
    border-radius: 15px;
    width: 90%;
    max-width: 400px;
    display: none;
    z-index: 5;
}

/* Blur bg */
.blur {
    position: fixed;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(6px);
    display: none;
    z-index: 4;
}

/* Hearts */
.heart {
    position: absolute;
    bottom: -10px;
    font-size: 18px;
    animation: float 6s linear;
}

@keyframes float {
    to {
        transform: translateY(-100vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="Enna Sona Ok Jaanu 320 Kbps(2).mp3">
</audio>

<div class="progress">
    <div class="bar"><div class="fill" id="f1"></div></div>
    <div class="bar"><div class="fill" id="f2"></div></div>
    <div class="bar"><div class="fill" id="f3"></div></div>
    <div class="bar"><div class="fill" id="f4"></div></div>
</div>

<!-- Stories -->
<div class="story s1 active" id="s1">
    <h1>Hey Sunidhi 💜</h1>
    <img src="https://media.tenor.com/7kG1F2R4Q6kAAAAC/love-couple.gif">
    <p>I made something for you…</p>
</div>

<div class="story s2" id="s2">
    <h1>You matter ✨</h1>
    <img src="https://media.tenor.com/2roX3uxz_68AAAAC/love.gif">
    <p>Even when things feel heavy...</p>
</div>

<div class="story s3" id="s3">
    <h1>Tap for message 💌</h1>
</div>

<div class="story s4" id="s4">
    <img src="https://media.tenor.com/YkV8K0t9Z2kAAAAC/icecream-love.gif">
    <h1>For you 🍦🌸</h1>
    <p>Thank you for smiling 💜</p>
</div>

<!-- Tap zones -->
<div class="zone left" onclick="prevStory()"></div>
<div class="zone right" onclick="nextStory()"></div>

<!-- Popup -->
<div class="blur" id="blur"></div>
<div class="popup" id="popup"></div>

<script>
let current = 1;
let total = 4;
let duration = 5000;
let timer;

/* Music */
document.body.addEventListener("click", () => {
    document.getElementById("music").play().catch(()=>{});
}, { once: true });

/* Show story */
function showStory(n){
    clearTimeout(timer);

    document.querySelectorAll(".story").forEach(s => s.classList.remove("active"));
    document.getElementById("s"+n).classList.add("active");

    animateBar(n);

    timer = setTimeout(() => {
        if(current < total){
            current++;
            showStory(current);
        }
    }, duration);
}

/* Progress */
function animateBar(n){
    let fill = document.getElementById("f"+n);
    fill.style.width = "0%";
    setTimeout(()=> fill.style.width="100%",50);
}

/* Navigation */
function nextStory(){
    if(current < total){
        current++;
        showStory(current);
    }
}

function prevStory(){
    if(current > 1){
        current--;
        showStory(current);
    }
}

/* Letter popup */
document.getElementById("s3").onclick = function(e){
    e.stopPropagation();

    let text = `Hey Sunidhi, my pretty girl 🤍

Ik sometimes life gets hard... but I know how strong you are.

So please smile for me... you look absolutely gorgeous ✨

Bas dil pe mat lo itna 😭
I'm always here 🤍`;

    let popup = document.getElementById("popup");
    let blur = document.getElementById("blur");

    popup.innerHTML = "";
    popup.style.display = "block";
    blur.style.display = "block";

    let i=0;
    function type(){
        if(i < text.length){
            popup.innerHTML += text[i];
            i++;
            setTimeout(type, 25);
        }
    }
    type();

    blur.onclick = () => {
        popup.style.display="none";
        blur.style.display="none";
    };
};

/* Hearts */
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
},500);

showStory(1);
</script>

</body>
</html>
